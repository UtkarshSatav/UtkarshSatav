<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 190" width="100%">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.6" fill="#DC2626" fill-opacity="0.45"/>
    </pattern>
    <radialGradient id="overlay" cx="0" cy="0" r="1"
                    gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(900,0) scale(720,152)">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="90%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="900" height="190" fill="#ffffff"/>
  <rect width="900" height="190" fill="url(#dotgrid)"/>
  <rect width="900" height="190" fill="url(#overlay)"/>

  <!-- 1px red line at bottom -->
  <rect y="189" width="900" height="1" fill="#DC2626"/>

  <text x="64" y="90"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700"
        fill="#991B1B" letter-spacing="1.5">Utkarsh Satav</text>

  <rect x="64" y="104" width="48" height="2.5" rx="1.5" fill="#DC2626"/>

  <text x="64" y="138"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" fill="#9CA3AF" letter-spacing="1">Tech Enthusiast  ·  Builder  ·  Explorer</text>
</svg>

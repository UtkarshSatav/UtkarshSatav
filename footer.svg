<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="100%">
  <defs>

    <!-- Same 32px dot grid -->
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.6" fill="#DC2626" fill-opacity="0.45"/>
    </pattern>

    <!--
      Mirror of header: ellipse anchored at bottom-left (0%, 100%)
        translate(0, 100)  → center at bottom-left
        scale(720, 80)     → 80%×80% ellipse of 900×100 viewport
      Dots visible at bottom-left, fade toward top-right.
    -->
    <radialGradient id="overlay"
                    cx="0" cy="0" r="1"
                    gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(0,100) scale(720,80)">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="90%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </radialGradient>

  </defs>

  <!-- Base white background -->
  <rect width="900" height="100" fill="#ffffff"/>

  <!-- Full dot grid -->
  <rect width="900" height="100" fill="url(#dotgrid)"/>

  <!-- Diagonal fade overlay -->
  <rect width="900" height="100" fill="url(#overlay)"/>

  <!-- Red accent strip at top -->
  <rect width="900" height="6" fill="#DC2626"/>

  <!-- Small blush wave beneath the strip -->
  <path d="M0,6 C180,18 360,4 540,14 C720,24 810,8 900,12 L900,6 L0,6 Z"
        fill="#FEE2E2"/>

</svg>
